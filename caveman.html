// ===== UNIT DRAWING =====
function drawUnit(u){
  if(u.x<-50||u.x>W+50)return;
  var spr=SC['u'+u.age+u.tier+(u.st==='attack'?1:0)];
  if(!spr)return;
  var bob=0;
  if(u.st==='walk')bob=Math.sin(u.fr*.15)*2;
  var drawX,drawY=GY-spr.height+OL+bob;
  if(u.team===1){
    drawX=u.x-spr.width/2;
    X.drawImage(spr,drawX,drawY);
  }else{
    X.save();X.translate(u.x,0);X.scale(-1,1);
    X.drawImage(spr,-spr.width/2,drawY);
    X.restore();
  }
  // HP bar
  if(u.hp<u.mhp){
    var bw=u.tier===2?32:22;
    var by=GY-spr.height-4+bob;
    X.fillStyle='#111';X.fillRect(u.x-bw/2-1,by-1,bw+2,5);
    X.fillStyle='#333';X.fillRect(u.x-bw/2,by,bw,3);
    X.fillStyle=u.hp/u.mhp>.3?'#2ECC71':'#E74C3C';X.fillRect(u.x-bw/2,by,bw*(u.hp/u.mhp),3);
  }
}

function drawProj(p){
  if(p.x<-10||p.x>W+10)return;
  var a=p.age||0;
  X.fillStyle='#111';X.beginPath();X.arc(p.x,p.y,4+OL,0,Math.PI*2);X.fill();
  if(a>=3){X.fillStyle=a===4?'#60A0E0':'#4A4A4A';X.fillRect(p.x-5,p.y-1.5,10,3)}
  else{X.fillStyle=a>=1?'#666':'#888';X.beginPath();X.arc(p.x,p.y,3,0,Math.PI*2);X.fill()}
}
function drawParts(){for(var i=0;i<parts.length;i++){var p=parts[i];X.globalAlpha=p.life;X.fillStyle=p.c;X.beginPath();X.arc(p.x,p.y,p.sz*p.life,0,Math.PI*2);X.fill()}X.globalAlpha=1}

// ===== GAME LOGIC =====
function spawnUnit(tier,team){var age=team===1?pAge:eAge;var u=AGE_UNITS[age][tier];us.push({type:tier,age:age,team:team,x:team===1?90:W-90,hp:u[1],mhp:u[1],dmg:u[2],spd:u[3],range:u[4],atkSpd:u[5],cost:u[6],at:0,aa:0,st:'walk',fr:Math.random()*100|0,tier:tier})}
function updateUnits(dt){
  for(var i2=0;i2<us.length;i2++){var u=us[i2];u.fr++;var dir=u.team===1?1:-1;var near=null,nd=1e9;
    for(var j=0;j<us.length;j++){var e=us[j];if(e.team===u.team||e.hp<=0)continue;var d=Math.abs(e.x-u.x);if(d<nd){nd=d;near=e}}
    var bxx=u.team===1?W-70:70,bd=Math.abs(u.x-bxx);
    if(nd<=u.range&&near){u.st='attack';u.at+=dt;u.aa+=dt;if(u.at>=u.atkSpd){u.at=0;if(u.range>50){proj.push({x:u.x,y:GY-20,vx:(near.x-u.x)>0?5:-5,vy:-1.5,dmg:u.dmg,team:u.team,age:u.age});snd('throw')}else{near.hp-=u.dmg;snd('hit');mkP(near.x,GY-15,'#e74c3c',3);addDmg(near.x,GY-30,u.dmg)}}}
    else if(bd<50){u.st='attack';u.at+=dt;u.aa+=dt;if(u.at>=u.atkSpd){u.at=0;if(u.team===1)p2HP-=u.dmg;else p1HP-=u.dmg;snd('basehit');mkP(bxx,GY-25,'#f39c12',4);addDmg(bxx,GY-40,u.dmg)}}
    else{u.st='walk';u.x+=u.spd*dir;u.aa=0}}
  for(var i2=us.length-1;i2>=0;i2--){if(us[i2].hp<=0){snd('die');mkP(us[i2].x,GY-12,'#8B4513',8);
    var kg=Math.floor(us[i2].cost*.4),kx=Math.floor(us[i2].cost/3);
    if(us[i2].team===2){gold+=kg;xp+=kx}else if(mode==='sp'){eGold+=kg;eXP+=kx}
    us.splice(i2,1)}}
}
function updateProj(dt){for(var i2=proj.length-1;i2>=0;i2--){var p=proj[i2];p.x+=p.vx;p.y+=p.vy;p.vy+=.12;var hit=false;for(var j=0;j<us.length;j++){var u=us[j];if(u.team===p.team||u.hp<=0)continue;if(Math.abs(u.x-p.x)<14&&p.y>GY-45){u.hp-=p.dmg;snd('hit');mkP(p.x,p.y,'#e74c3c',3);addDmg(u.x,GY-30,p.dmg);hit=true;break}}if(hit||p.y>GY||p.x<0||p.x>W)proj.splice(i2,1)}}
function updateTurrets(dt){[pTur,eTur].forEach(function(t,ti){var team=ti===0?1:2,tbx=team===1?70:W-70;t.forEach(function(tr){tr.at=(tr.at||0)+dt;var cfg=AGE_TURRET[tr.age];if(tr.at>=cfg[2]){var near2=null,nd2=1e9;for(var j=0;j<us.length;j++){var u=us[j];if(u.team===team)continue;var d2=Math.abs(u.x-tbx);if(d2<cfg[1]&&d2<nd2){nd2=d2;near2=u}}if(near2){tr.at=0;near2.hp-=cfg[0];mkP(near2.x,GY-15,'#FFA500',2);addDmg(near2.x,GY-30,cfg[0])}}})})}
function updateAI(dt){if(mode!=='sp')return;var cfg=AI_CFG[diff];aiT+=dt*1000;if(aiT>=cfg.rate){aiT=0;if(eGold>0){var r=Math.random(),tier2=0;if(r>cfg.tw[0]+cfg.tw[1])tier2=2;else if(r>cfg.tw[0])tier2=1;var cost=AGE_UNITS[eAge][tier2][6];if(eGold>=cost){eGold-=cost;spawnUnit(tier2,2)}}}
  if(Math.random()<cfg.tc&&eTur.length<3){var tc2=AGE_TURRET[eAge][3];if(eGold>=tc2){eGold-=tc2;eTur.push({age:eAge,at:0})}}
  if(eAge<4){var ec=EVO_COST[eAge+1];if(eXP>=ec*cfg.ed){eXP-=ec;eAge++;eGold+=50}}
  eGold+=AGE_GOLD[eAge]*dt}
function mkP(x,y,c,n){for(var i2=0;i2<n;i2++)parts.push({x:x,y:y,vx:(Math.random()-.5)*4,vy:-Math.random()*4-1,life:1,decay:.025+Math.random()*.02,c:c,sz:2+Math.random()*3})}
function updateParts(){for(var i2=parts.length-1;i2>=0;i2--){var p=parts[i2];p.x+=p.vx;p.y+=p.vy;p.vy+=.1;p.life-=p.decay;if(p.life<=0)parts.splice(i2,1)}}
function addDmg(x,y,v){dmgNums.push({x:x-8,y:y,v:v,vy:-1.5,life:1,c:'#FFF'})}
function updateDmg(){for(var i2=dmgNums.length-1;i2>=0;i2--){var d=dmgNums[i2];d.y+=d.vy;d.vy+=.03;d.life-=.025;if(d.life<=0)dmgNums.splice(i2,1)}}

// ===== ACTIONS =====
function spawn(tier){var u=AGE_UNITS[pAge][tier];if(gold<u[6])return;gold-=u[6];snd('spawn');if(mode==='guest'){ch.send({type:'broadcast',event:'spawn',payload:{tier:tier}});spawnUnit(tier,2)}else spawnUnit(tier,1)}
function buyTurret(){if(pTur.length>=3)return;var cost=AGE_TURRET[pAge][3];if(gold<cost)return;gold-=cost;pTur.push({age:pAge,at:0});snd('spawn')}
function evolve(){if(pAge>=4)return;var cost=EVO_COST[pAge+1];if(xp<cost)return;xp-=cost;pAge++;gold+=50;snd('evolve')}
function useSpecial(){if(specCD>0)return;specCD=45;snd('meteor');for(var i2=0;i2<us.length;i2++){if(us[i2].team===2){var dmg2=30*(pAge+1);us[i2].hp-=dmg2;mkP(us[i2].x,GY-20,'#FF4500',8);addDmg(us[i2].x,GY-25,dmg2)}}p2HP-=20*(pAge+1);mkP(W-70,GY-30,'#FF4500',10)}

// ===== MULTIPLAYER =====
async function createRoom(){var ch2='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';rc='';for(var i2=0;i2<4;i2++)rc+=ch2[Math.floor(Math.random()*ch2.length)];document.getElementById('rcd').textContent=rc;document.getElementById('crs').textContent='Waiting...';document.getElementById('crs').className='st';ch=sb.channel('cw-'+rc,{config:{broadcast:{self:false}}});ch.on('broadcast',{event:'join'},function(){document.getElementById('crs').textContent='Connected!';document.getElementById('crs').className='st ok';setTimeout(function(){mode='host';beginGame()},500)});ch.on('broadcast',{event:'spawn'},function(p){spawnUnit(p.payload.tier,2)});ch.on('broadcast',{event:'rematch'},function(){rematch()});await ch.subscribe()}
async function joinRoom(){rc=document.getElementById('ji').value.trim().toUpperCase();if(rc.length!==4){document.getElementById('jrs').textContent='Enter 4-char code';return}document.getElementById('jrs').textContent='Connecting...';ch=sb.channel('cw-'+rc,{config:{broadcast:{self:false}}});ch.on('broadcast',{event:'state'},function(p){var s=p.payload;p1HP=s.p1;p2HP=s.p2;us=s.us.map(function(u){return Object.assign({},u)});proj=s.pj.map(function(pp){return Object.assign({},pp)})});ch.on('broadcast',{event:'gameover'},function(p){showGO(p.payload.w)});ch.on('broadcast',{event:'rematch'},function(){rematch()});await ch.subscribe();await ch.send({type:'broadcast',event:'join',payload:{}});document.getElementById('jrs').textContent='Connected!';document.getElementById('jrs').className='st ok';mode='guest';setTimeout(function(){beginGame()},800)}
function bcastSync(dt){if(!ch||mode!=='host')return;syncT+=dt;if(syncT>=.1){syncT=0;ch.send({type:'broadcast',event:'state',payload:{p1:p1HP,p2:p2HP,us:us.map(function(u){return{type:u.type,age:u.age,team:u.team,tier:u.tier,x:u.x,hp:u.hp,mhp:u.mhp,dmg:u.dmg,spd:u.spd,range:u.range,atkSpd:u.atkSpd,cost:u.cost,st:u.st,fr:u.fr,at:u.at,aa:u.aa||0}}),pj:proj.map(function(p){return{x:p.x,y:p.y,vx:p.vx,vy:p.vy,dmg:p.dmg,team:p.team,age:p.age||0}})}})}}

// ===== FLOW =====
function beginGame(){initAudio();startMusic();document.getElementById('menu').classList.add('hidden');document.getElementById('xb').classList.add('on');document.getElementById('go').classList.remove('on');gold=200;xp=0;p1HP=BASE_HP;p2HP=BASE_HP;pAge=0;eGold=200;eXP=0;eAge=0;us=[];proj=[];parts=[];dmgNums=[];pTur=[];eTur=[];aiT=0;resT=0;syncT=0;specCD=0;tick=0;run=true;lt=performance.now();if(af)cancelAnimationFrame(af);loop()}
function loop(){if(!run)return;af=requestAnimationFrame(loop);var now=performance.now(),dt=Math.min((now-lt)/1e3,.05);lt=now;tick++;resT+=dt;if(resT>=1){resT=0;gold+=AGE_GOLD[pAge]}if(specCD>0)specCD=Math.max(0,specCD-dt);if(mode!=='guest'){updateUnits(dt);updateProj(dt);updateTurrets(dt);updateAI(dt);bcastSync(dt);if(p2HP<=0){p2HP=0;showGO('p1');return}if(p1HP<=0){p1HP=0;showGO('p2');return}}updateParts();updateDmg();
  X.clearRect(0,0,W,H);X.imageSmoothingEnabled=false;drawBg();drawGround();drawBase(70,1);drawBase(W-70,2);us.sort(function(a,b){return a.x-b.x});for(var i2=0;i2<us.length;i2++)drawUnit(us[i2]);for(var i2=0;i2<proj.length;i2++)drawProj(proj[i2]);drawParts();drawDmgNums();drawHUD()}
function showGO(w){run=false;var t=document.getElementById('got');if((w==='p1'&&mode!=='guest')||(w==='p2'&&mode==='guest')){t.textContent='VICTORY!';t.className='gt gw';snd('win')}else{t.textContent='DEFEATED';t.className='gt gl';snd('lose')}document.getElementById('go').classList.add('on');if(ch&&mode==='host')ch.send({type:'broadcast',event:'gameover',payload:{w:w}})}
function rematch(){if(ch)ch.send({type:'broadcast',event:'rematch',payload:{}});beginGame()}
function toMenu(){run=false;stopMusic();if(af)cancelAnimationFrame(af);if(ch){ch.unsubscribe();ch=null}rc=null;mode=null;document.getElementById('menu').classList.remove('hidden');document.getElementById('xb').classList.remove('on');document.getElementById('go').classList.remove('on');showScr('scr-main')}
function startSP(){mode='sp';beginGame()}
function showScr(id){document.querySelectorAll('.scr').forEach(function(s){s.classList.remove('active')});document.getElementById(id).classList.add('active');if(id==='scr-cr')createRoom();if(id==='scr-jr')document.getElementById('ji').focus()}
function setDiff(d,b){diff=d;document.querySelectorAll('.db').forEach(function(x2){x2.classList.remove('active')});b.classList.add('active')}
function copyRC(){navigator.clipboard.writeText(rc);event.target.textContent='Copied!';setTimeout(function(){event.target.textContent='Copy Code'},1200)}
function cancelMP(){if(ch){ch.unsubscribe();ch=null}rc=null;showScr('scr-main')}

// ===== INPUT =====
document.addEventListener('keydown',function(e){if(!run)return;if(e.key==='1')spawn(0);if(e.key==='2')spawn(1);if(e.key==='3')spawn(2);if(e.key==='t'||e.key==='T')buyTurret();if(e.key==='q'||e.key==='Q')useSpecial();if(e.key==='e'||e.key==='E')evolve()});

// ===== INIT =====
setupCanvas();
initSprites();
C.addEventListener('click',function(ev){if(!run||!window._btns)return;var r=C.getBoundingClientRect();var sx=(ev.clientX-r.left)*(W/r.width),sy=(ev.clientY-r.top)*(H/r.height);window._btns.forEach(function(b){if(sx>=b.x&&sx<=b.x+b.w&&sy>=H-54&&sy<=H-6){if(b.id<=2)spawn(b.id);else if(b.id===3)buyTurret();else if(b.id===4)useSpecial();else if(b.id===5)evolve()}})});
C.addEventListener('mousemove',function(ev){if(!run||!window._btns){hoverBtn=-1;return}var r=C.getBoundingClientRect();var sx=(ev.clientX-r.left)*(W/r.width),sy=(ev.clientY-r.top)*(H/r.height);hoverBtn=-1;window._btns.forEach(function(b){if(sx>=b.x&&sx<=b.x+b.w&&sy>=H-54&&sy<=H-6)hoverBtn=b.id})});

// Menu background animation
function menuBg(){if(!document.getElementById('menu').classList.contains('hidden')){tick++;X.imageSmoothingEnabled=false;drawBg();drawGround();drawBase(70,1);drawBase(W-70,2);
  for(var i2=0;i2<3;i2++){var spr=SC['u0'+i2+'0'];if(spr){var mx=200+i2*90;X.drawImage(spr,mx-spr.width/2,GY-spr.height+OL)}}}requestAnimationFrame(menuBg)}menuBg();

window.startSP=startSP;window.showScr=showScr;window.setDiff=setDiff;window.copyRC=copyRC;window.cancelMP=cancelMP;window.joinRoom=joinRoom;window.spawn=spawn;window.buyTurret=buyTurret;window.evolve=evolve;window.useSpecial=useSpecial;window.rematch=rematch;window.toMenu=toMenu;
});
</script>
