// Analyze attack frames at load time: find topmost non-transparent row per frame
// so we can crop empty space and prevent "shrinking" during combat
function analyzeAttackFrames(){
  var tmpC=document.createElement('canvas');
  var tmpX=tmpC.getContext('2d');
  for(var a=0;a<5;a++){
    for(var t=0;t<3;t++){
      var sheet=SP['u'+a+t];
      if(!sheet)continue;
      var fw=SHEET_FW[a][t];
      var fh=SHEET_H;
      var key='u'+a+t;
      SP[key+'_atkY']=[];
      tmpC.width=fw;tmpC.height=fh;
      for(var f=8;f<16;f++){
        tmpX.clearRect(0,0,fw,fh);
        tmpX.drawImage(sheet,f*fw,0,fw,fh,0,0,fw,fh);
        var data=tmpX.getImageData(0,0,fw,fh).data;
        var topRow=0;
        for(var y=0;y<fh;y++){
          var found=false;
          for(var x=0;x<fw;x++){if(data[(y*fw+x)*4+3]>20){found=true;break}}
          if(found){topRow=y;break}
        }
        SP[key+'_atkY'].push(topRow);
      }
    }
  }
}

function loadSprites(cb){
  var total=0,loaded=0,toLoad=[];
  for(var a=0;a<5;a++)for(var t=0;t<3;t++)
    toLoad.push({key:'u'+a+t,src:'sprites/'+ERA_F[a]+'_'+TYPE_F[t]+'.png'});
  toLoad.push({key:'bg',src:'sprites/background.png'});
  for(var a=0;a<5;a++){
    toLoad.push({key:'b'+a,src:'sprites/base_'+ERA_F[a]+'.png'});
    toLoad.push({key:'tb'+a,src:'sprites/tower_'+ERA_F[a]+'_base.png'});
    for(var tt=1;tt<=3;tt++)toLoad.push({key:'tr'+a+'_'+tt,src:'sprites/turret_'+ERA_F[a]+'_'+tt+'.png'});
  }
  total=toLoad.length;
  var bar=document.getElementById('lfill');
  toLoad.forEach(function(item){
    var img=new Image();
    img.onload=function(){SP[item.key]=img;loaded++;bar.style.width=(loaded/total*100)+'%';if(loaded>=total){spritesReady=true;analyzeAttackFrames();document.getElementById('loadscr').classList.add('done');cb()}};
    img.onerror=function(){console.warn('Missing:'+item.src);loaded++;bar.style.width=(loaded/total*100)+'%';if(loaded>=total){spritesReady=true;analyzeAttackFrames();document.getElementById('loadscr').classList.add('done');cb()}};
    img.src=item.src;
  });
}

// ===== STATE =====
var C,X,mode=null,diff='easy',rc=null,ch=null;

var sfxPool={};

function playSfx(file,vol){
  if(!sfxPool[file]){sfxPool[file]=[];for(var i=0;i<3;i++){var a=new Audio('sfx/'+file);a.volume=vol||.35;sfxPool[file].push(a)}}
  var pool=sfxPool[file];
  for(var i=0;i<pool.length;i++){if(pool[i].paused||pool[i].ended){pool[i].currentTime=0;pool[i].volume=vol||.35;pool[i].play().catch(function(){});return}}
  // all busy, clone
  var a=new Audio('sfx/'+file);a.volume=vol||.35;a.play().catch(function(){});sfxPool[file].push(a);

function snd(t){

  else if(t==='shoot'){playSfx(Math.random()<.5?'whoosh_01.mp3':'whoosh_02.mp3',.2)}

// ===== CANVAS (fullscreen, native resolution) =====
function setupCanvas(){
  C=document.getElementById('gc');X=C.getContext('2d');
  function rz(){
    var sw=window.innerWidth,sh=window.innerHeight;
    var dpr=window.devicePixelRatio||1;
    // Calculate game logical size (maintains aspect ratio)
    var aspect=W/H;
    var screenAspect=sw/sh;
    var cw,ch;
    if(screenAspect>aspect){ch=H;cw=Math.round(H*screenAspect);}
    else{cw=W;ch=Math.round(W/screenAspect);}
    // Canvas physical = NATIVE screen resolution (no browser upscaling!)
    C.width=Math.round(sw*dpr);C.height=Math.round(sh*dpr);
    C.style.width=sw+'px';C.style.height=sh+'px';
    // Transform: map game coords -> physical pixels
    var gameScale=sw/cw; // CSS px per game unit
    X.setTransform(dpr*gameScale,0,0,dpr*gameScale,0,0);
    viewScale=cw/sw; // game units per CSS px (for mouse input)
    cW=cw;cH=ch;
    X.imageSmoothingEnabled=false;
  }
  rz();window.addEventListener('resize',rz);
}

// ===== CAMERA =====
function wx(worldX){return worldX-camX}
function screenToWorld(sx){return sx+camX}
function updateCamera(dt){
  // Scroll when mouse near edges
  var edgeZone=cW*0.12;
  var scrollSpd=500;
  if(mouseRawX<edgeZone)camTargetX-=scrollSpd*dt*(1-mouseRawX/edgeZone);
  if(mouseRawX>cW-edgeZone)camTargetX+=scrollSpd*dt*(1-(cW-mouseRawX)/edgeZone);
  camTargetX=Math.max(0,Math.min(WORLD_W-cW,camTargetX));
  camX+=(camTargetX-camX)*.1;
}

// ===== DRAWING =====
function drawBg(){
  // Sky gradient (fixed, not scrolling)
  var g=X.createLinearGradient(0,0,0,GY);
  g.addColorStop(0,'#87CEEB');g.addColorStop(0.35,'#9AD4E8');g.addColorStop(0.65,'#B0D8D0');g.addColorStop(1,'#C8E0B8');
  X.fillStyle=g;X.fillRect(0,0,cW,GY);
  // Sun
  X.fillStyle='#FFF8DC';X.shadowColor='#FFE88A';X.shadowBlur=50;
  X.beginPath();X.arc(cW-160,55,32,0,Math.PI*2);X.fill();X.shadowBlur=0;
  // Clouds (parallax - move slower than world)
  X.fillStyle='rgba(255,255,255,.4)';
  var ct=tick*.06;
  var cx=camX*.3; // parallax offset
  [[100,38,50],[400,25,60],[750,48,38],[1100,32,52],[1500,42,45]].forEach(function(c){
    var px=c[0]-cx+(ct*20+c[0])%(cW+300)-150;
    X.beginPath();X.arc(px,c[1],c[2]*.32,0,Math.PI*2);X.arc(px+c[2]*.28,c[1]-c[2]*.08,c[2]*.24,0,Math.PI*2);X.arc(px+c[2]*.52,c[1]+c[2]*.02,c[2]*.2,0,Math.PI*2);X.fill();
  });
  // Terrain background image (single stretch across world — no tiling seams)
  var bgI=SP['bg'];
  if(bgI){
    var bgW=WORLD_W+100;
    var bgFullH=bgW/(bgI.width/bgI.height);
    var terrainH=380;
    var srcFrac=terrainH/bgFullH;
    var srcTop=Math.floor(bgI.height*(1-srcFrac));
    var srcH2=bgI.height-srcTop;
    X.drawImage(bgI,0,srcTop,bgI.width,srcH2,wx(-50),GY-terrainH+15,bgW,terrainH);
  }
}
function drawGround(){
  X.fillStyle='#4A7A3D';X.fillRect(0,GY-2,cW,4);
  X.fillStyle='#5A8A4A';X.fillRect(0,GY,cW,3);
  var g=X.createLinearGradient(0,GY+3,0,H+50);
  g.addColorStop(0,'#8B7555');g.addColorStop(.3,'#7A6548');g.addColorStop(1,'#4A3A28');
  X.fillStyle=g;X.fillRect(0,GY+3,cW,H-GY+50);
}
function drawTowerSlot(bx,slot,age,team){
  var dir=team===1?1:-1;
  var sx=wx(bx)+TOWER_SLOTS[slot].dx*dir;
  var sy=GY+TOWER_SLOTS[slot].dy;
  // Tower base sprite
  var tbImg=SP['tb'+age];
  if(tbImg){
    var tbW=tbImg.width*(TOWER_BASE_H/tbImg.height);
    X.save();
    if(team===2){X.translate(sx,0);X.scale(-1,1);X.drawImage(tbImg,-tbW/2,sy-TOWER_BASE_H,tbW,TOWER_BASE_H);}
    else X.drawImage(tbImg,sx-tbW/2,sy-TOWER_BASE_H,tbW,TOWER_BASE_H);
    X.restore();
  }
  // Turret sprite on top (type 1-3)
  var trType=arguments[4]||1; // turret type (1-based)
  var trImg=SP['tr'+age+'_'+trType];
  if(trImg){
    var trW=trImg.width*(TURRET_H/trImg.height);
    trW=Math.min(trW,55);
    X.save();
    if(team===2){X.translate(sx,0);X.scale(-1,1);X.drawImage(trImg,-trW/2,sy-TOWER_BASE_H-TURRET_H+5,trW,TURRET_H);}
    else X.drawImage(trImg,sx-trW/2,sy-TOWER_BASE_H-TURRET_H+5,trW,TURRET_H);
    X.restore();
  }
}
function drawBase(bx,team){
  var hp=team===1?p1HP:p2HP,maxhp=team===1?p1MaxHP:p2MaxHP,age=team===1?pAge:eAge,pct=hp/maxhp;
  var turrets=team===1?pTur:eTur;
  var screenBx=wx(bx);
  // Skip if offscreen
  if(screenBx<-200||screenBx>cW+200)return;
  // Draw base image
  var baseImg=SP['b'+age];
  if(baseImg){
    var bH=BASE_H;var bW=baseImg.width*(bH/baseImg.height);
    X.save();
    if(team===2){X.translate(screenBx,0);X.scale(-1,1);X.drawImage(baseImg,-bW/2,GY-bH,bW,bH);}
    else X.drawImage(baseImg,screenBx-bW/2,GY-bH,bW,bH);
    X.restore();
  }
  // Draw tower slots with turrets
  var numSlots=team===1?pSlots:eSlots;
  for(var i=0;i<turrets.length&&i<numSlots;i++){
    drawTowerSlot(bx,i,turrets[i].age!=null?turrets[i].age:age,team,(turrets[i].type||0)+1);
  }
  // Empty owned slots (no turret placed yet)
  for(var i=turrets.length;i<numSlots;i++){

function drawUnit(u){

  var fw=SHEET_FW[u.age][spTier];
  var fh=SHEET_H;
  var fi,srcY=0,srcH=fh;

  var dW=fw*(dH/fh);

    // Attack animation: frames 8-15, synced to attack timer

}

// ===== GAME LOGIC =====
function spawnUnit(tier,team){var age=team===1?pAge:eAge;var ud=AGE_UNITS[age];if(tier>=ud.length)return;var u=ud[tier];var mult=team===2?DIFF_MULT[diff]:1;us.push({age:age,tier:tier,team:team,x:team===1?P_SPAWN_X:E_SPAWN_X,hp:Math.floor(u[1]*mult),mhp:Math.floor(u[1]*mult),dmg:u[2],range:u[3],atkSpd:u[4],cost:u[5],reward:u[6],isRanged:u[8],at:0,st:'walk',walkT:Math.random()*8,name:u[0]})}
function queueUnit(tier){var ud=AGE_UNITS[pAge];if(tier>=ud.length)return;var u=ud[tier];if(gold<u[5]||trainQ.length>=MAX_QUEUE)return;gold-=u[5];trainQ.push({tier:tier,tt:u[7],name:u[0]});if(trainQ.length===1)trainT=trainQ[0].tt;snd('spawn')}
function updateTraining(dt){if(trainQ.length===0)return;trainT-=dt;if(trainT<=0){spawnUnit(trainQ[0].tier,1);trainQ.shift();if(trainQ.length>0)trainT=trainQ[0].tt;else trainT=0}}
function updateUnits(dt){
  var t1=[],t2=[];
  for(var i=0;i<us.length;i++){if(us[i].team===1)t1.push(us[i]);else t2.push(us[i])}
  t1.sort(function(a,b){return b.x-a.x});
  t2.sort(function(a,b){return a.x-b.x});
  for(var i=0;i<us.length;i++){var u=us[i];var dir=u.team===1?1:-1;
    // Clamp position: units cannot walk past enemy base
    if(u.team===1&&u.x>E_BASE_X)u.x=E_BASE_X;
    if(u.team===2&&u.x<P_BASE_X)u.x=P_BASE_X;
    // Find nearest enemy
    var nearEnemy=null,nearDist=1e9;
    var enemies=u.team===1?t2:t1;
    for(var j=0;j<enemies.length;j++){var d=Math.abs(u.x-enemies[j].x);if(d<nearDist){nearDist=d;nearEnemy=enemies[j]}}
    // Check friendly unit blocking ahead
    var ahead=null;
    var friendlies=u.team===1?t1:t2;
    for(var j=0;j<friendlies.length;j++){var f=friendlies[j];if(f===u)continue;
      var dx=u.team===1?(f.x-u.x):(u.x-f.x);
      if(dx>0&&dx<35){ahead=f;break}}
    // Base distance
    var baseTgt=u.team===1?E_BASE_X:P_BASE_X;
    var distToBase=Math.abs(u.x-baseTgt);
    // Determine new state
    var newSt;
    if(distToBase<55){
      newSt='attack';u.at+=dt;
      if(u.at>=u.atkSpd){u.at=0;
        if(nearEnemy&&nearDist<=u.range){
          nearEnemy.hp-=u.dmg;snd('hit');mkP(nearEnemy.x,GY-18,'#e74c3c',4);addDmg(nearEnemy.x,GY-35,u.dmg);
        }else{
          if(u.team===1){p2HP-=u.dmg}else{p1HP-=u.dmg}
          snd('basehit');mkP(baseTgt,GY-30,'#f39c12',5);addDmg(baseTgt,GY-45,u.dmg)}}
    }else if(nearEnemy&&nearDist<=u.range){
      newSt='attack';u.at+=dt;
      if(u.at>=u.atkSpd){u.at=0;
        if(u.isRanged&&nearDist>MELEE_RANGE){proj.push({x:u.x,y:GY-25,vx:(nearEnemy.x>u.x?5:-5),vy:-1.2,dmg:u.dmg,team:u.team,age:u.age});snd('shoot')}
        else{nearEnemy.hp-=u.dmg;snd('hit');mkP(nearEnemy.x,GY-18,'#e74c3c',4);addDmg(nearEnemy.x,GY-35,u.dmg)}}
    }else if(ahead){
      newSt='idle';
    }else{
      newSt='walk';u.x+=MOVE_SPD*dir*dt;
      if(u.team===1&&u.x>E_BASE_X)u.x=E_BASE_X;
      if(u.team===2&&u.x<P_BASE_X)u.x=P_BASE_X;
    }
    // Always advance walk animation (used for rendering in all states)
    u.walkT=(u.walkT||0)+dt*(newSt==='walk'?2:0.8);
    // Reset attack timer when entering attack from non-attack state
    if(newSt!=='attack'&&u.st==='attack')u.at=0;
    u.st=newSt;
  }
  for(var i=us.length-1;i>=0;i--){if(us[i].hp<=0){snd('die');mkP(us[i].x,GY-15,'#8B4513',8);
    var rwd=us[i].reward;
    if(us[i].team===2){gold+=rwd;xp+=rwd*2}
    else if(us[i].team===1){if(mode==='sp'){eGold+=rwd;eXP+=rwd*2}xp+=Math.floor(rwd/2)}
    us.splice(i,1)}}
}
function updateProj(dt){for(var i=proj.length-1;i>=0;i--){var p=proj[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.12;var hit=false;for(var j=0;j<us.length;j++){var u=us[j];if(u.team===p.team||u.hp<=0)continue;if(Math.abs(u.x-p.x)<18&&p.y>GY-55){if(p.dmg>0){u.hp-=p.dmg;snd('hit');addDmg(u.x,GY-35,p.dmg)}mkP(p.x,p.y,p.dmg>0?'#e74c3c':'#FFA500',3);hit=true;break}}if(hit||p.y>GY||p.x<0||p.x>WORLD_W)proj.splice(i,1)}}
function updateTurrets(dt){
  [pTur,eTur].forEach(function(tarr,ti){
    var team=ti===0?1:2;
    var tbx=team===1?P_BASE_X:E_BASE_X;
    tarr.forEach(function(tr){
      var td=TURRET_DATA[tr.age][tr.type||0];
      tr.at=(tr.at||0)+dt;
      if(tr.at>=td[2]){
        var near=null,nd=1e9;
        for(var j=0;j<us.length;j++){var u=us[j];if(u.team===team)continue;var d=Math.abs(u.x-tbx);if(d<td[1]&&d<nd){nd=d;near=u}}
        if(near){tr.at=0;near.hp-=td[0];addDmg(near.x,GY-35,td[0]);
          // Visual: projectile from turret to target
          var dir2=team===1?1:-1;
          var sl=TOWER_SLOTS[tr.slot]||TOWER_SLOTS[0];
          var tSx=tbx+sl.dx*dir2;var tSy=GY+sl.dy-TOWER_BASE_H-5;
          mkP(tSx,tSy,'#FFA500',3);
          var n=8;var pdx=near.x-tSx;var pdy=(GY-18)-tSy;var gAcc=0.12*n*(n-1)/2;
          proj.push({x:tSx,y:tSy,vx:pdx/n,vy:(pdy-gAcc)/n,dmg:0,team:team,age:tr.age||0})}
      }
    });
  });
}

// ===== AI =====
function updateAI(dt){if(mode!=='sp')return;
  aiAgeT+=dt;aiPhaseT+=dt;aiT+=dt;
  // AI passive gold income (scales with age and difficulty)
  var aiIncome=[10,30,100,400,1500][eAge];
  eGold+=dt*aiIncome*DIFF_MULT[diff];
  var spawnInterval;
  if(aiPhase===0)spawnInterval=3+Math.random()*5;
  else if(aiPhase===1)spawnInterval=2+Math.random()*4;
  else spawnInterval=2+Math.random()*3;
  if(aiT>=spawnInterval){aiT=0;var tier;
    if(aiPhase===0)tier=0;
    else if(aiPhase===1)tier=Math.random()<.5?0:1;
    else tier=Math.random()<.25?0:Math.random()<.5?1:2;
    // AI must pay gold to spawn (like player)
    var aiUD=AGE_UNITS[eAge];if(tier<aiUD.length){var aiCost=aiUD[tier][5];if(eGold>=aiCost){eGold-=aiCost;spawnUnit(tier,2)}}}
  if(aiPhase<2&&aiPhaseT>=60){aiPhase++;aiPhaseT=0}
  if(eAge<4){var ageTime=AI_AGE_TIME[eAge];if(aiAgeT>=ageTime){var oldHP=BASE_HP[eAge];eAge++;p2MaxHP=BASE_HP[eAge];p2HP+=BASE_HP[eAge]-oldHP;aiPhase=0;aiPhaseT=0;aiAgeT=0}}
  // AI turret management (gold-based)
  aiTurT=(aiTurT||0)+dt;
  if(aiTurT>15&&eSlots<4){var slCost=eSlots>0?SLOT_COST[eSlots-1]:0;if(eGold>=slCost){eGold-=slCost;eSlots++;aiTurT=0}}
  if(aiTurT>8&&eTur.length<eSlots){var tCost=TURRET_DATA[eAge][0][3];if(eGold>=tCost){eGold-=tCost;eTur.push({slot:eTur.length,type:0,age:eAge,at:0});aiTurT=0}}
}

// ===== SPECIAL ABILITIES =====
function useSpecial(){if(specActive||specCD>0)return;specCD=SPEC_CD;snd('special');var sp=SPECIALS[pAge];
  if(sp[1]==='rain'){for(var i=0;i<sp[2];i++){specProj.push({x:P_SPAWN_X+100+Math.random()*(WORLD_W-400),y:-50-Math.random()*200,vy:3.5+Math.random()*2.5,vx:(Math.random()-.5)*1.2,dmg:sp[3],life:5,c:pAge===0?'#888':'#8B6530',sz:pAge===0?5:4,team:1})}}
  else if(sp[1]==='heal'){specActive={type:'heal',dur:5,t:0,rate:sp[3]}}
  else if(sp[1]==='bomb'){specActive={type:'bomb',t:0,interval:.4,count:sp[2],spawned:0,planeX:camX-60}}
  else if(sp[1]==='laser'){for(var i=0;i<sp[2];i++){specProj.push({x:P_SPAWN_X+100+i*60,y:-25,vy:9,vx:0,dmg:sp[3],life:3,c:'#60A0E0',sz:4,team:1,delay:i*.1})}}}
function updateSpecials(dt){
  for(var i=specProj.length-1;i>=0;i--){var s=specProj[i];if(s.delay&&s.delay>0){s.delay-=dt;continue}s.y+=s.vy;s.x+=s.vx||0;s.life-=dt;if(s.y>=GY){
    for(var j=0;j<us.length;j++){if(us[j].team!==s.team&&Math.abs(us[j].x-s.x)<30){us[j].hp-=s.dmg;addDmg(us[j].x,GY-35,s.dmg)}}
    mkP(s.x,GY-5,'#FF4500',6);specProj.splice(i,1)}else if(s.life<=0){specProj.splice(i,1)}}
  if(specActive&&specActive.type==='heal'){specActive.t+=dt;for(var i=0;i<us.length;i++){if(us[i].team===1){us[i].hp=Math.min(us[i].mhp+50,us[i].hp+specActive.rate*dt)}}if(specActive.t>=specActive.dur)specActive=null}
  if(specActive&&specActive.type==='bomb'){specActive.t+=dt;specActive.planeX+=180*dt;if(specActive.planeX>P_SPAWN_X+200&&specActive.t>=specActive.interval*specActive.spawned&&specActive.spawned<specActive.count){specActive.spawned++;specProj.push({x:specActive.planeX,y:250,vy:4.5,vx:0,dmg:500,life:4,c:'#4A4A4A',sz:6,team:1})}if(specActive.planeX>WORLD_W+100)specActive=null;
    else{var px=wx(specActive.planeX);X.fillStyle='#555';X.fillRect(px-25,180,50,10);X.fillStyle='#666';X.fillRect(px-6,173,12,7);X.fillStyle='#888';X.fillRect(px+12,182,18,5)}}
}
function mkP(x,y,c,n){for(var i=0;i<n;i++)parts.push({x:x,y:y,vx:(Math.random()-.5)*4.5,vy:-Math.random()*4.5-1,life:1,decay:.022+Math.random()*.02,c:c,sz:2.5+Math.random()*3.5})}
function updateParts(){for(var i=parts.length-1;i>=0;i--){var p=parts[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.1;p.life-=p.decay;if(p.life<=0)parts.splice(i,1)}}
function addDmg(x,y,v){dmgNums.push({x:x-10,y:y,v:v,vy:-1.8,life:1,c:'#FFF'})}
function updateDmg(){for(var i=dmgNums.length-1;i>=0;i--){var d=dmgNums[i];d.y+=d.vy;d.vy+=.03;d.life-=.022;if(d.life<=0)dmgNums.splice(i,1)}}

// ===== ACTIONS =====
function spawn(tier){queueUnit(tier)}
function buySlot(){if(pSlots>=4)return;var cost=SLOT_COST[pSlots-1];if(gold<cost)return;gold-=cost;pSlots++;snd('spawn')}
function buyTurret(type){if(typeof type==='undefined')type=0;if(pTur.length>=pSlots)return;var td=TURRET_DATA[pAge][type];if(!td||gold<td[3])return;gold-=td[3];pTur.push({slot:pTur.length,type:type,age:pAge,at:0});snd('spawn')}
function sellTurret(){if(pTur.length===0)return;var t=pTur.pop();var td=TURRET_DATA[t.age][t.type];gold+=Math.floor(td[3]/2);snd('die')}
function evolve(){if(pAge>=4)return;var cost=EVO_COST[pAge];if(xp<cost)return;
  // XP is a threshold, NOT consumed (faithful to original)
  var oldHP=BASE_HP[pAge];pAge++;p1MaxHP=BASE_HP[pAge];p1HP+=BASE_HP[pAge]-oldHP;snd('evolve')}

// ===== MULTIPLAYER =====
async function createRoom(){var ch2='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';rc='';for(var i=0;i<4;i++)rc+=ch2[Math.floor(Math.random()*ch2.length)];document.getElementById('rcd').textContent=rc;document.getElementById('crs').textContent='Waiting...';document.getElementById('crs').className='st';ch=sb.channel('cw-'+rc,{config:{broadcast:{self:false}}});ch.on('broadcast',{event:'join'},function(){document.getElementById('crs').textContent='Connected!';document.getElementById('crs').className='st ok';setTimeout(function(){mode='host';beginGame()},500)});ch.on('broadcast',{event:'spawn'},function(p){spawnUnit(p.payload.tier,2)});ch.on('broadcast',{event:'rematch'},function(){rematch()});await ch.subscribe()}
async function joinRoom(){rc=document.getElementById('ji').value.trim().toUpperCase();if(rc.length!==4){document.getElementById('jrs').textContent='Enter 4-char code';return}document.getElementById('jrs').textContent='Connecting...';ch=sb.channel('cw-'+rc,{config:{broadcast:{self:false}}});ch.on('broadcast',{event:'state'},function(p){var s=p.payload;p1HP=s.p1;p2HP=s.p2;p1MaxHP=s.m1;p2MaxHP=s.m2;us=s.us.map(function(u){return Object.assign({},u)});proj=s.pj.map(function(pp){return Object.assign({},pp)})});ch.on('broadcast',{event:'gameover'},function(p){showGO(p.payload.w)});ch.on('broadcast',{event:'rematch'},function(){rematch()});await ch.subscribe();await ch.send({type:'broadcast',event:'join',payload:{}});document.getElementById('jrs').textContent='Connected!';document.getElementById('jrs').className='st ok';mode='guest';setTimeout(function(){beginGame()},800)}
function bcastSync(dt){if(!ch||mode!=='host')return;syncT+=dt;if(syncT>=.1){syncT=0;ch.send({type:'broadcast',event:'state',payload:{p1:p1HP,p2:p2HP,m1:p1MaxHP,m2:p2MaxHP,us:us.map(function(u){return{age:u.age,tier:u.tier,team:u.team,x:u.x,hp:u.hp,mhp:u.mhp,dmg:u.dmg,range:u.range,atkSpd:u.atkSpd,cost:u.cost,reward:u.reward,isRanged:u.isRanged,st:u.st,fr:u.fr,at:u.at,name:u.name}}),pj:proj.map(function(p){return{x:p.x,y:p.y,vx:p.vx,vy:p.vy,dmg:p.dmg,team:p.team,age:p.age||0}})}})}}

// ===== FLOW =====
function beginGame(){initAudio();startMusic();document.getElementById('menu').classList.add('hidden');document.getElementById('xb').classList.add('on');document.getElementById('go').classList.remove('on');
  gold=START_GOLD;xp=0;pAge=0;eAge=0;p1HP=BASE_HP[0];p1MaxHP=BASE_HP[0];p2HP=BASE_HP[0];p2MaxHP=BASE_HP[0];
  eGold=START_GOLD;eXP=0;us=[];proj=[];parts=[];dmgNums=[];specProj=[];pTur=[];eTur=[];trainQ=[];trainT=0;
  pSlots=1;eSlots=1;uiMode='units'; // both start with 1 free turret slot
  aiT=0;aiPhase=0;aiPhaseT=0;aiAgeT=0;syncT=0;aiTurT=0;specActive=null;specCD=0;tick=0;
  camX=0;camTargetX=0;
  run=true;lt=performance.now();if(af)cancelAnimationFrame(af);loop()}
function loop(){if(!run)return;af=requestAnimationFrame(loop);
  if(paused){
    // Draw pause overlay
    X.fillStyle='rgba(0,0,0,.5)';X.fillRect(0,0,cW,cH);
    X.textAlign='center';X.font='bold 36px Bungee';X.fillStyle='#FFF';
    X.fillText('PAUSED',cW/2,cH/2-10);
    X.font='bold 12px Inter';X.fillStyle='rgba(255,255,255,.5)';
    X.fillText('Press ESC to resume',cW/2,cH/2+25);
    X.textAlign='left';return;
  }
  var now=performance.now(),dt=Math.min((now-lt)/1e3,.05);lt=now;tick++;
  if(specCD>0)specCD-=dt;
  updateCamera(dt);
  if(mode!=='guest'){updateTraining(dt);updateUnits(dt);updateProj(dt);updateTurrets(dt);updateAI(dt);bcastSync(dt);if(p2HP<=0){p2HP=0;showGO('p1');return}if(p1HP<=0){p1HP=0;showGO('p2');return}}
  updateSpecials(dt);updateParts();updateDmg();
  // DRAW
  X.clearRect(0,0,cW,cH);X.imageSmoothingEnabled=false;
  drawBg();drawGround();
  drawBase(P_BASE_X,1);drawBase(E_BASE_X,2);
  us.sort(function(a,b){return a.x-b.x});for(var i=0;i<us.length;i++)drawUnit(us[i]);
  for(var i=0;i<proj.length;i++)drawProj(proj[i]);
  drawSpecProj();drawParts();drawDmgNums();drawHUD();
}
function showGO(w){run=false;var t=document.getElementById('got');if((w==='p1'&&mode!=='guest')||(w==='p2'&&mode==='guest')){t.textContent='VICTORY!';t.className='gt gw';snd('win')}else{t.textContent='DEFEATED';t.className='gt gl';snd('lose')}document.getElementById('go').classList.add('on');if(ch&&mode==='host')ch.send({type:'broadcast',event:'gameover',payload:{w:w}})}
function rematch(){if(ch)ch.send({type:'broadcast',event:'rematch',payload:{}});beginGame()}
function toMenu(){run=false;stopMusic();if(af)cancelAnimationFrame(af);if(ch){ch.unsubscribe();ch=null}rc=null;mode=null;document.getElementById('menu').classList.remove('hidden');document.getElementById('xb').classList.remove('on');document.getElementById('go').classList.remove('on');showScr('scr-main')}
function startSP(){mode='sp';beginGame()}
function showScr(id){document.querySelectorAll('.scr').forEach(function(s){s.classList.remove('active')});document.getElementById(id).classList.add('active');if(id==='scr-cr')createRoom();if(id==='scr-jr')document.getElementById('ji').focus()}
function setDiff(d,b){diff=d;document.querySelectorAll('.db').forEach(function(x2){x2.classList.remove('active')});b.classList.add('active')}
function copyRC(){navigator.clipboard.writeText(rc);event.target.textContent='Copied!';setTimeout(function(){event.target.textContent='Copy Code'},1200)}
function cancelMP(){if(ch){ch.unsubscribe();ch=null}rc=null;showScr('scr-main')}

// ===== INPUT =====
var paused=false;
document.addEventListener('keydown',function(e){
  // ESC to pause/unpause
  if(e.key==='Escape'&&mode){
    paused=!paused;
    if(!paused){lt=performance.now();if(run)loop()}
    return;
  }
  if(!run||paused)return;var k=e.key;
  if(uiMode==='units'){
    if(k==='1')spawn(0);if(k==='2')spawn(1);if(k==='3')spawn(2);if(k==='4'&&AGE_UNITS[pAge].length>3)spawn(3);
    if(k==='t'||k==='T')uiMode='turrets';
    if(k==='q'||k==='Q')useSpecial();if(k==='e'||k==='E')evolve();
  }else{
    if(k==='1')buyTurret(0);if(k==='2')buyTurret(1);if(k==='3')buyTurret(2);
    if(k==='s'||k==='S')buySlot();if(k==='x'||k==='X')sellTurret();
    if(k==='t'||k==='T')uiMode='units';
  }
});
C=document.getElementById('gc');
C.addEventListener('mousemove',function(ev){
  mouseRawX=ev.clientX*viewScale;mouseRawY=ev.clientY*viewScale;
  if(!run||!window._btns){hoverBtn=-1;return}
  hoverBtn=-1;
  window._btns.forEach(function(b){if(mouseRawX>=b.x&&mouseRawX<=b.x+b.w&&mouseRawY>=b.y&&mouseRawY<=b.y+b.h)hoverBtn=b.id});
});
C.addEventListener('click',function(ev){
  if(!run||!window._btns)return;
  var mx=ev.clientX*viewScale,my=ev.clientY*viewScale;
  window._btns.forEach(function(b){
    if(mx>=b.x&&mx<=b.x+b.w&&my>=b.y&&my<=b.y+b.h){
      if(b.id<=3)spawn(b.id);
      else if(b.id===11)useSpecial();else if(b.id===12)evolve();
      else if(b.id===20)uiMode='turrets';
      else if(b.id>=30&&b.id<=32)buyTurret(b.id-30);
      else if(b.id===33)buySlot();else if(b.id===34)sellTurret();
      else if(b.id===35)uiMode='units';
    }
  });
});

// ===== INIT =====
setupCanvas();
loadSprites(function(){
  pAge=0;eAge=0;p1HP=BASE_HP[0];p1MaxHP=BASE_HP[0];p2HP=BASE_HP[0];p2MaxHP=BASE_HP[0];
  pTur=[];eTur=[];camX=0;camTargetX=0;
  function menuBg(){
    if(!document.getElementById('menu').classList.contains('hidden')){
      tick++;X.imageSmoothingEnabled=false;X.clearRect(0,0,cW,cH);
      camX=200;drawBg();drawGround();drawBase(P_BASE_X,1);drawBase(E_BASE_X,2);
      // Demo units walking
      for(var i=0;i<3;i++){
        var sheet=SP['u0'+i];
        if(!sheet)continue;
        var fw=SHEET_FW[0][i],fh=SHEET_H;
        var dH=UNIT_H[0][i];var scale=dH/fh;var dW=fw*scale;
        var fi=(tick/3|0)%N_WALK;
        var px=wx(350+i*120);
        X.drawImage(sheet,fi*fw,0,fw,fh,px-dW/2,GY-dH,dW,dH);
      }
    }
    requestAnimationFrame(menuBg);
  }
  menuBg();
});
window.startSP=startSP;window.showScr=showScr;window.setDiff=setDiff;window.copyRC=copyRC;window.cancelMP=cancelMP;window.joinRoom=joinRoom;window.spawn=spawn;window.buyTurret=buyTurret;window.evolve=evolve;window.useSpecial=useSpecial;window.rematch=rematch;window.toMenu=toMenu;
});
</script>
