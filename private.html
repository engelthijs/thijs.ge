<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Private</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet"/>
<style>
body { font-family: 'Inter', sans-serif; }
h1, h2 { font-family: 'Space Grotesk', sans-serif; }
</style>
</head>
<body class="bg-stone-50 min-h-screen flex items-center justify-center">

<div id="login" class="text-center space-y-6 p-10">
    <h1 class="text-3xl font-bold tracking-tight">Private Area</h1>
    <p class="text-zinc-500">Enter the password to continue.</p>
    <form onsubmit="return checkPassword()" class="space-y-4">
        <input id="pw" type="password" placeholder="Password"
            class="block mx-auto px-6 py-3 rounded-xl border border-zinc-300 focus:outline-none focus:border-blue-700 text-center text-lg"/>
        <button type="submit"
            class="bg-blue-800 text-white px-8 py-3 rounded-xl font-bold hover:shadow-xl transition-all">
            Enter
        </button>
    </form>
    <p id="error" class="text-red-500 text-sm hidden">Incorrect password.</p>
</div>

<div id="content" class="hidden text-center p-10 space-y-6">
    <img src="secret.jpg" alt="" class="max-w-md mx-auto rounded-2xl shadow-2xl"/>
    <p class="text-zinc-400 text-sm mt-4"><a href="index.html" class="hover:underline">&larr; Back</a></p>
</div>

<script>
function checkPassword() {
    var input = document.getElementById('pw').value;
    if (input === 'Rijnlaan131') {
        document.getElementById('login').classList.add('hidden');
        document.getElementById('content').classList.remove('hidden');
    } else {
        document.getElementById('error').classList.remove('hidden');
    }
    return false;
}
</script>
</body>
</html>
